{% extends 'base.html' %}

{% block title %}New Sighting{% endblock %}

{% block content %}
<h2>Report a New Bird Sighting</h2>
<form method="post" enctype="multipart/form-data">

    <label for="location">Location (from supplied list)</label>
    <select name="location" id="location" required>
        {% for region in regions %}
        <option value="{{ region }}">{{ region }}</option>
        {% endfor %}
    </select>

    <label for="date_obs">Date of observation</label>
    <input type="date" id="date_obs" name="date_obs" required>

    <label for="time_obs">Time of observation</label>
    <input type="time" id="time_obs" name="time_obs" required>

    <label for="bird_species">Bird</label>
    <select name="bird_species" id="bird_species" required>
        {% for bird in birds %}
        <option value="{{ bird }}">{{ bird }}</option>
        {% endfor %}
    </select>

    <label for="activity">Primary activity</label>
    <select name="activity" id="activity" required>
        {% for act in activities %}
        <option value="{{ act }}">{{ act }}</option>
        {% endfor %}
    </select>

    <label for="duration_mins">Duration of observation (in minutes)</label>
    <input type="number" id="duration_mins" name="duration_mins" min="1" required>

    <label for="comments">Free text comments</label>
    <textarea id="comments" name="comments" rows="5"></textarea>

    <label for="photo">Photographic image (optional; max 1.2MB, png or jpg)</label>
    <input type="file" id="photo" name="photo" accept="image/png, image/jpeg">

    <input type="submit" value="Submit Sighting" class="button">
</form>
{% endblock %}
